; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; 提醒：如果你电脑上的 COM 口经常变化，建议不要写死 upload_port/monitor_port。
; PlatformIO 会自动探测可用串口。
; 只有在你电脑上同时连了多个串口设备、自动探测选错时，再取消注释并改成你的 COM 号：
; upload_port = COMx
; monitor_port = COMx

monitor_speed = 115200

; 默认环境仍编译 src/main.cpp（你的 WebServer 示例），并排除 labs 目录。
build_src_filter =
  +<main.cpp>
  -<labs/*>

; Wi-Fi/HTTP 示例：把你的 Wi-Fi 信息填到这里（推荐做法）
; 注意：双引号需要保留
; 提醒：经典 ESP32 只支持 2.4GHz Wi-Fi，不支持 5GHz。
; 如果你的路由器把 2.4G / 5G 合并同名（双频合一），建议先给 2.4G 单独起个 SSID。
;
; 把下面三行取消注释并填入你的信息：
build_flags =
  ; 重要：这里必须用 \"...\"，确保宏在 C/C++ 里是字符串
  -D WIFI_SSID=\"esp32\"
  -D WIFI_PASS=\"88888888\"
  -D HTTP_URL=\"http://172.31.48.72:8000/value.json\"
  -D HTTP_BODY_PREVIEW_CHARS=1000 
  ; HTTP 拉取间隔（毫秒），越小越“实时”，也越费电/占网络
  -D HTTP_INTERVAL_MS=2000

; ==========================
; 课程实验（lab1 ~ lab5）
; 使用方法：
;   pio run -e lab1 -t upload
;   pio device monitor -e lab1
; 或在 VS Code 左下角切换 Environment
; ==========================

[env:lab1]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_src_filter =
  -<*>
  +<labs/lab1_gpio_led_chase.cpp>

